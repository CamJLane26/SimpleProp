services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: simpleprop
      POSTGRES_PASSWORD: simpleprop
      POSTGRES_DB: simpleprop
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simpleprop -d simpleprop"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgres://simpleprop:simpleprop@db:5432/simpleprop
      PORT: "3001"
      HOST: "0.0.0.0"
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_CESIUM_ION_TOKEN: ${VITE_CESIUM_ION_TOKEN:-}
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
